      <stop offset="100%" stop-color="#5AC8FA"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#1F2937" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="1200" rx="68" fill="url(#bg)"/>

  <g filter="url(#cardShadow)">
    <rect x="154" y="118" width="892" height="964" rx="56" fill="url(#glass)" stroke="#DCE3EE" stroke-width="3"/>
  </g>

  <rect x="210" y="182" width="252" height="58" rx="29" fill="url(#accent)"/>
  <text x="336" y="219" text-anchor="middle" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="25" font-weight="700" fill="#FFFFFF">PLAUD AI PRO</text>

  <text x="210" y="370" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="126" font-weight="700" fill="#111827">12</text>
  <text x="470" y="370" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="56" font-weight="600" fill="#374151">месяцев</text>

  <text x="210" y="448" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="38" font-weight="500" fill="#3F4B5C">Подписка для продвинутой AI-работы</text>

  <g opacity="0.96">
    <rect x="210" y="548" width="780" height="88" rx="20" fill="#FFFFFF" stroke="#DEE6F1"/>
    <text x="250" y="603" font-family="'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="32" font-weight="500" fill="#111827">• Быстрая обработка и конспекты встреч</text>

    <rect x="210" y="664" width="780" height="88" rx="20" fill="#FFFFFF" stroke="#DEE6F1"/>
    <text x="250" y="719" font-family="'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="32" font-weight="500" fill="#111827">• Расширенные функции анализа диалогов</text>

    <rect x="210" y="780" width="780" height="88" rx="20" fill="#FFFFFF" stroke="#DEE6F1"/>
    <text x="250" y="835" font-family="'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="32" font-weight="500" fill="#111827">• Срок действия подписки: 12 месяцев</text>
