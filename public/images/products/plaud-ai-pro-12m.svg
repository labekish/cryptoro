  <line x1="210" y1="926" x2="990" y2="926" stroke="#E3E8F0" stroke-width="2"/>
  <text x="210" y="975" font-family="'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="27" font-weight="500" fill="#6B7280">Digital subscription · AC-61</text>
